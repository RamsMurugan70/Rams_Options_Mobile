[build]
  command = "cd client && npm install && npm run build"
  publish = "client/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["server/**"]

[functions."api"]
  # Netlify free tier allows up to 26s for background functions
  # BSE scraping can take 10-15s, so we need the max
  external_node_modules = ["yahoo-finance2"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
